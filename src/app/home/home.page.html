<ion-header class="ion-no-border">
  <div
    class="px-4 py-3 bg-gradient-to-r from-[#1f2937]/90 to-[#374151]/90 backdrop-blur-md flex items-center justify-between border-b border-white/10 sticky top-0 z-[100] shadow-md shadow-black/20">
    <!-- Logo/Brand -->
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 bg-green-500 rounded-lg flex items-center justify-center shadow-[2px_2px_0px_#000]">
        <span class="text-black font-black text-xs italic">AJ</span>
      </div>
      <div class="flex flex-col leading-none">
        <span class="text-white font-black text-lg tracking-tighter uppercase italic text-3d-main">AVIVATOR</span>
        <span class="text-green-500 text-[10px] font-black tracking-[0.2em] -mt-1 uppercase text-3d-sub">JEET</span>
      </div>
    </div>

    <!-- Balance & Deposit -->
    <div class="flex items-center gap-3">
      <div class="bg-black/40 border border-white/10 rounded-full px-3 py-1.5 flex items-center gap-2">
        <div class="w-5 h-5 bg-emerald-600 rounded-full flex items-center justify-center border border-white/20">
          <span class="text-[10px] font-bold text-white">PK</span>
        </div>
        <span class="text-white font-bold text-sm">0.00</span>
        <div class="w-4 h-4 text-green-500 animate-spin-slow">
          <ion-icon name="notifications-outline" class="text-xs"></ion-icon>
        </div>
      </div>
      <button (click)="handleDeposit()"
        class="bg-[#d2fe07] hover:bg-[#b0d606] text-black font-black text-xs px-4 py-2 rounded-lg transition-transform active:scale-95 flex items-center gap-1.5">
        Deposit
        <div class="w-3 h-3 border-2 border-black/20 border-t-black rounded-full animate-spin"></div>
      </button>
    </div>
  </div>
</ion-header>

<ion-content>
  <div class="p-4 space-y-6">

    <!-- Hot Section Header -->
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-5 h-5 flex items-center justify-center text-orange-500">
          <ion-icon name="flame" class="text-lg"></ion-icon>
        </div>
        <h2 class="text-white text-lg font-black tracking-tight uppercase">Hot</h2>
      </div>
      <div class="flex items-center gap-1 text-gray-500 hover:text-white transition-colors cursor-pointer group">
        <span class="text-xs font-bold uppercase tracking-widest">All</span>
        <ion-icon name="chevron-forward" class="text-xs group-hover:translate-x-0.5 transition-transform"></ion-icon>
      </div>
    </div>

    <!-- Game Grid (3 columns as per screenshot) -->
    <div class="grid grid-cols-3 gap-3">
      <div *ngFor="let game of games" (click)="navigateToGame(game)"
        class="game-grid-card relative aspect-[3/4.2] rounded-24 overflow-hidden group cursor-pointer transition-transform duration-300 active:scale-95">

        <div class="image-area">
          <!-- HOT Badge -->
          <div *ngIf="game.popular" class="hot-badge">
            HOT
          </div>

          <!-- Favorite Star -->
          <div *ngIf="game.favorite" class="fav-star">
            <ion-icon name="star"></ion-icon>
          </div>

          <!-- Background Image -->
          <img [src]="game.image" [alt]="game.title">

          <!-- Provider Badge overlay on image bottom -->
          <div class="provider-badge">
            <span>{{ game.provider }}</span>
          </div>
        </div>

        <!-- Title Bar at the very bottom -->
        <div class="title-bar">
          <span>{{ game.title }}</span>
        </div>
      </div>
    </div>

  </div>
</ion-content>

<app-footer-nav activeTab="home"></app-footer-nav>

<!-- Auth Modal Component -->
<app-auth-modal [isOpen]="isAuthModalOpen" (close)="isAuthModalOpen = false" (authSuccess)="handleAuthSuccess()">
</app-auth-modal>

<!-- Success Modal Component -->
<app-success-modal [isOpen]="isSuccessModalOpen" (close)="isSuccessModalOpen = false" (deposit)="handleDeposit()">
</app-success-modal>

<!-- Reward Modal Component -->
<app-reward-modal [isOpen]="isRewardModalOpen" (close)="isRewardModalOpen = false"
  (depositClick)="handleRewardDeposit($event)">
</app-reward-modal>
