<app-offer-header 
  [tabs]="tabs" 
  [activeTab]="activeTab" 
  (tabChange)="activeTab = $event" 
  (back)="goBack()">
</app-offer-header>

<ion-content class="[--background:#111419] [--padding-bottom:10px] offers-list-scroll">
  <div class="flex h-full">

    <!-- Sidebar (Only on Event tab) -->
    @if (activeTab === 'event') {
      <app-offer-sidebar 
        [activeSidebar]="activeSidebar"
        [isLoadingRewards]="isLoadingRewards"
        (sidebarChange)="activeSidebar = $event"
        (navigateToHistory)="activeTab = 'history'"
        (refreshRewards)="refreshRewards()"
        (openRedemption)="openRedemption()">
      </app-offer-sidebar>
    }

    <!-- Right Content Area -->
    <div class="flex-1 h-full overflow-y-auto pt-4 pb-14 relative bg-[#111419] offers-list-scroll">
      <div>
        @switch (activeTab) {
          @case ('event') {
            <app-offer-event 
              [offers]="offers" 
              (offerClick)="openOffer($event)">
            </app-offer-event>
          }

          @case ('mission') {
            <app-offer-mission 
              [activeMissionTab]="activeMissionTab"
              [missions]="missions"
              [isLoadingMissions]="isLoadingMissions"
              (missionChannelChange)="setMissionTab($event)"
              (refreshMissions)="refreshMissions()"
              (claimMission)="loadAllData()">
            </app-offer-mission>
          }

          @case ('vip') {
            <app-offer-vip 
              [vipTiers]="vipTiers"
              [activeVipLevel]="activeVipLevel"
              [activeVipData]="activeVipData"
              [unclaimed]="unclaimed"
              [isLoadingUnclaimed]="isLoadingUnclaimed"
              (levelChange)="onVipLevelScrollChange($event)"
              (refreshUnclaimed)="refreshUnclaimed()"
              (viewHistory)="activeTab = 'history'"
              (claimBonus)="loadAllData()">
            </app-offer-vip>
          }

          @case ('unclaimed') {
            <app-offer-unclaimed 
              [unclaimed]="unclaimed"
              [isLoadingUnclaimed]="isLoadingUnclaimed"
              (refreshUnclaimed)="refreshUnclaimed()"
              (claimCategory)="loadAllData()">
            </app-offer-unclaimed>
          }

          @case ('history') {
            <app-offer-history 
              [activeHistoryFilter]="activeHistoryFilter"
              [activeStatusFilter]="activeStatusFilter"
              [isHistoryFilterOpen]="isHistoryFilterOpen"
              [isStatusFilterOpen]="isStatusFilterOpen"
              [historyPeriods]="historyPeriods"
              [statusOptions]="statusOptions"
              [historyRecords]="historyRecords"
              [pendingHistoryFilter]="pendingHistoryFilter"
              (toggleHistory)="toggleHistoryFilter()"
              (confirmHistory)="confirmHistoryFilter()"
              (toggleStatus)="toggleStatusFilter()"
              (setStatus)="setStatusFilter($event)"
              (setPendingFilter)="pendingHistoryFilter = $event">
            </app-offer-history>
          }
        }
      </div>
    </div>
  </div>
</ion-content>

<app-footer-nav activeTab="offers"></app-footer-nav>
