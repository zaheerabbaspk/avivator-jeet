<ion-header class="ion-no-border">
  <div class="offers-header bg-gradient-to-r from-[#1f2937]/90 to-[#374151]/90 backdrop-blur-md px-4 py-3 flex items-center justify-between border-b border-white/10 sticky top-0 z-[100] shadow-md shadow-black/20">
    <div class="flex items-center gap-3">
      <button (click)="goBack()" class="w-8 h-8 flex items-center justify-center text-white/80 active:scale-90 transition-transform">
        <ion-icon name="chevron-back-outline" class="text-2xl"></ion-icon>
      </button>
      <span class="text-white font-black text-lg tracking-tight uppercase italic">Offers</span>
    </div>
    
    <div class="flex items-center gap-4">
      <ion-icon name="headset-outline" (click)="handleSupport()" class="text-2xl text-[#00CFFF] active:scale-90 transition-transform"></ion-icon>
      <ion-icon name="document-text-outline" (click)="handleRecords()" class="text-2xl text-[#00CFFF] active:scale-90 transition-transform"></ion-icon>
    </div>
  </div>
</ion-header>

<ion-content class="ion-padding-bottom">
  <div class="content-wrapper p-4 space-y-6">
    
    <!-- Hero Banner (Optional/Future) -->
    <div (click)="showTreasure()" class="hero-card cursor-pointer active:scale-[0.98] transition-transform relative rounded-2xl overflow-hidden aspect-[16/7] border border-white/10 p-6 flex flex-col justify-end">
      <div class="absolute top-4 right-4 text-4xl opacity-20 transform -rotate-12">
        <ion-icon name="gift-outline"></ion-icon>
      </div>
      <h2 class="text-[#d2fe07] text-2xl font-black uppercase italic italic tracking-tighter leading-none">First Deposit</h2>
      <p class="text-white/80 text-sm font-bold mt-1 uppercase tracking-widest">Get Extra Rewards Now</p>
    </div>

    <!-- First Deposit Tasks Section -->
    <div class="section-container">
      <div class="flex items-center justify-between mb-4">
        <div class="flex flex-col">
          <h3 class="text-white font-black text-md uppercase tracking-tight">First recharge task</h3>
          <p class="text-gray-500 text-[10px]">Only the first deposit after sign up is eligible for a reward</p>
        </div>
        <div class="flex items-center gap-1 text-[#d2fe07] text-xs font-bold cursor-pointer active:opacity-70 transition-opacity">
          <ion-icon name="refresh-outline"></ion-icon>
          <span>Refresh</span>
        </div>
      </div>

      <!-- Reward List -->
      <div class="space-y-3 pb-20">
        <div *ngFor="let item of rewards" class="reward-card p-4 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-between gap-4 group">
          <div class="flex items-center gap-4 flex-1">
            <!-- Icon -->
            <div class="w-12 h-12 bg-[#3b82f6] rounded-xl flex items-center justify-center relative shadow-lg shadow-blue-500/20">
              <ion-icon name="wallet-outline" class="text-white text-2xl"></ion-icon>
              <div class="absolute -top-1 -right-1 w-5 h-5 bg-[#f7c04a] rounded-full border-2 border-[#1f2937] flex items-center justify-center">
                <div class="w-2 h-2 bg-white rounded-full"></div>
              </div>
            </div>

            <!-- Details -->
            <div class="flex-1 flex flex-col">
              <span class="text-white/90 text-[11px] font-bold">First Deposit ≥ {{item.target}}</span>
              <span class="text-[#f7c04a] text-lg font-black tracking-tight mt-0.5">Reward {{item.reward | number:'1.2-2'}}</span>
              <!-- Simple Progress Bar -->
              <div class="mt-2 h-2 w-full bg-black/40 rounded-full overflow-hidden border border-white/5">
                <div class="h-full bg-white/20" [style.width.%]="(item.progress / item.target) * 100"></div>
              </div>
            </div>
          </div>

          <!-- Action -->
          <button (click)="navigateToDeposit(item.target)" class="bg-[#d2fe07] hover:bg-[#b0d606] text-black font-black text-xs px-5 py-2.5 rounded-xl transition-all active:scale-95 shadow-lg shadow-[#d2fe07]/20">
            Deposit
          </button>
        </div>
      </div>
    </div>

  </div>
</ion-content>

<app-footer-nav activeTab="offers"></app-footer-nav>

<!-- Treasure Chest Alert -->
<app-treasure-modal 
  [isOpen]="isTreasureModalOpen" 
  (didDismiss)="isTreasureModalOpen = false">
</app-treasure-modal>
