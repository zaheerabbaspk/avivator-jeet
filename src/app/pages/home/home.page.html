<ion-header class="ion-no-border">
  <app-home-header 
    [isLoggedIn]="isLoggedIn" 
    [userBalance]="userBalance" 
    [isLoadingBalance]="isLoadingBalance"
    (login)="handleLogin($event)"
    (deposit)="handleDeposit()"
    (refresh)="refreshBalance()">
  </app-home-header>
</ion-header>

<ion-content>
  <div class="home-body">

    <!-- Hero Banners -->
    <app-home-banners [slides]="bannerSlides"></app-home-banners>

    <!-- Brand Alliances -->
    <app-home-brands [brands]="brands"></app-home-brands>

    <!-- Announcement Bar -->
    <app-home-announce></app-home-announce>

    <app-home-categories 
      [categories]="categories" 
      [activeCategory]="activeCategory()"
      (categoryChange)="handleCategoryChange($event)">
    </app-home-categories>

    <!-- Hot Section Header (kept in page for layout control) -->
    <div class="section-header">
      <div class="section-title">
        <span class="fire-icon">🔥</span>
        <span>Hot</span>
      </div>
      <div class="section-nav">
        <button class="nav-arr">&lt;</button>
        <span class="nav-all">All</span>
        <button class="nav-arr">&gt;</button>
      </div>
    </div>

    <!-- Game Card Grid -->
    <app-home-game-grid 
      [games]="filteredGames()"
      (gameClick)="navigateToGame($event)">
    </app-home-game-grid>

  </div>

  <!-- TOP floating button -->
  <div class="top-fab" (click)="scrollToTop()">
    <ion-icon name="chevron-up-outline"></ion-icon>
    <span>TOP</span>
  </div>
</ion-content>

<!-- Footer Nav -->
<app-footer-nav activeTab="home"></app-footer-nav>

<!-- Modals -->
<app-auth-modal [isOpen]="isAuthModalOpen" [authMode]="authMode" (close)="isAuthModalOpen = false" (authSuccess)="handleAuthSuccess()"></app-auth-modal>
<app-success-modal [isOpen]="isSuccessModalOpen" (close)="isSuccessModalOpen = false" (deposit)="handleDeposit()"></app-success-modal>
<app-reward-modal [isOpen]="isRewardModalOpen" (close)="isRewardModalOpen = false" (depositClick)="handleRewardDeposit($event)"></app-reward-modal>
