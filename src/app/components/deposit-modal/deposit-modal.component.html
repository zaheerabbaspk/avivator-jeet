<ion-modal [isOpen]="isOpen" (didDismiss)="dismiss()" class="deposit-modal">
  <ng-template>
    <ion-header class="ion-no-border">
      <div class="deposit-header px-4 py-3 flex items-center justify-between bg-[#1c1c22] border-b border-white/5">
        <button (click)="dismiss()" class="text-white/60 text-2xl">
          <ion-icon name="close-outline"></ion-icon>
        </button>
        <span class="text-white font-black text-lg uppercase italic tracking-tight">Deposit</span>
        <div class="flex items-center gap-3">
          <ion-icon name="headset-outline" class="text-[#d4a017] text-xl"></ion-icon>
          <ion-icon name="document-text-outline" class="text-[#d4a017] text-xl"></ion-icon>
        </div>
      </div>
    </ion-header>

    <ion-content style="--background: #141418">
      <div class="deposit-container p-4 space-y-6">
        
        <!-- Payment Methods -->
        <div class="space-y-3">
          <div class="flex justify-between items-center text-xs font-bold text-white/60 uppercase tracking-widest">
            <span>Payment Method</span>
            <div class="bg-[#1e1e26] px-2 py-1 rounded-full flex items-center gap-1 border border-white/5">
              <ion-icon name="time-outline" class="text-[#fccc04]"></ion-icon>
              <span class="text-[#fccc04]">0.00</span>
              <ion-icon name="refresh-outline" class="text-[#d4a017] text-[10px]"></ion-icon>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div (click)="selectedMethod = 'jazzcash'" [class.active]="selectedMethod === 'jazzcash'" 
                 class="method-tab bg-[#1e1e26] border-2 border-white/5 rounded-2xl p-4 flex flex-col items-center gap-2 relative transition-all">
              <div class="absolute -top-2 -right-1 bg-[#ef4444] text-white text-[9px] font-black px-2 py-0.5 rounded shadow-lg">+2%</div>
              <img src="/assets/new-jazz-seeklogo.png" class="w-8 h-8 object-contain" />
              <span class="text-white font-bold text-xs uppercase">Jazzcash</span>
            </div>

            <div (click)="selectedMethod = 'easypaisa'" [class.active]="selectedMethod === 'easypaisa'"
                 class="method-tab bg-[#1e1e26] border-2 border-white/5 rounded-2xl p-4 flex flex-col items-center gap-2 relative transition-all">
              <div class="absolute -top-2 -right-1 bg-[#ef4444] text-white text-[9px] font-black px-2 py-0.5 rounded shadow-lg">+2%</div>
              <img src="/assets/easypaisa-seeklogo.png" class="w-8 h-8 object-contain" />
              <span class="text-white font-bold text-xs uppercase">Easypaisa</span>
            </div>
          </div>
        </div>

        <!-- Amount Grid -->
        <div class="space-y-3">
          <div class="flex justify-between items-center text-xs font-bold text-white/60 uppercase tracking-widest">
            <span>Deposit Amount</span>
            <span class="text-[#fccc04] underline text-[10px]">Bonus Rules</span>
          </div>

          <div class="grid grid-cols-4 gap-2">
            <div *ngFor="let item of amounts" 
                 (click)="selectAmount(item.val)"
                 [class.active]="selectedAmount === item.val"
                 class="amount-item bg-[#1e1e26] border border-white/5 rounded-xl p-2 text-center transition-all">
              <div class="text-white font-black text-sm">{{item.val}}</div>
              <div class="text-[#fccc04] text-[8px] font-bold">{{item.bonus}}</div>
            </div>
          </div>

          <div class="bg-[#1e1e26] border border-white/5 rounded-2xl p-4 flex items-center gap-3">
            <span class="text-white font-black text-sm border-r border-white/10 pr-3">Rs</span>
            <input type="tel" [(ngModel)]="customAmount" (input)="onCustomAmountChange()" 
                   placeholder="Min 100 ~ Max 50,000"
                   class="bg-transparent border-none outline-none text-white text-sm font-bold flex-1 placeholder:text-white/20" />
          </div>
        </div>

        <!-- Promotions Card -->
        <div class="bg-[#1e1e26]/50 border border-white/5 rounded-2xl p-5 space-y-4">
          <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
              <ion-icon name="gift-outline" class="text-[#fccc04] text-lg"></ion-icon>
              <span class="text-white font-bold text-sm">Deposit Promotion</span>
            </div>
            <div class="bg-[#ef4444] px-2 py-1 rounded flex items-center gap-1">
              <ion-icon name="time-outline" class="text-white text-[10px]"></ion-icon>
              <span class="text-white text-[10px] font-black">{{timer}}</span>
            </div>
          </div>
          
          <div class="space-y-3">
            <div *ngFor="let promo of promotions" class="flex justify-between items-center text-[10px]">
              <div class="flex items-center gap-2 text-white/80">
                <ion-icon name="gift-outline" class="text-white/30"></ion-icon>
                <span class="font-bold">{{promo.label}}</span>
              </div>
              <span class="text-white/40">{{promo.desc}}</span>
            </div>
          </div>
        </div>

        <!-- Payer Info -->
        <div class="space-y-3">
          <p class="text-white/40 text-[10px] text-center font-bold italic uppercase tracking-wider">Enter payer info for proper crediting</p>
          <div class="bg-[#1e1e26] border border-white/5 rounded-2xl p-4 space-y-2">
            <label class="text-[10px] font-bold text-white/60">
              <span class="text-[#ef4444] mr-1">*</span>Payer's mobile wallet number
            </label>
            <div class="flex items-center gap-2">
              <ion-icon name="phone-portrait-outline" class="text-white/20 text-lg"></ion-icon>
              <input type="tel" [(ngModel)]="walletNumber" placeholder="03XXXXXXXXXX"
                     class="bg-transparent border-none outline-none text-white text-sm font-bold flex-1 placeholder:text-white/20" />
              <button (click)="pasteNumber()" class="text-[#d4a017] text-[10px] font-black uppercase">Paste</button>
            </div>
          </div>
        </div>

      </div>
    </ion-content>

    <ion-footer class="ion-no-border">
      <div class="p-4 bg-[#141418]">
        <button [disabled]="!canDeposit" (click)="submitDeposit()"
                class="w-full py-4 rounded-2xl font-black uppercase tracking-widest text-sm transition-all shadow-lg
                       disabled:bg-white/10 disabled:text-white/40
                       bg-gradient-to-r from-[#d97706] to-[#facc15] !text-white shadow-[#facc15]/20 active:scale-[0.98]"
                style="text-shadow: 0 1px 3px rgba(0,0,0,0.4);">
          Deposit Now
        </button>
      </div>
    </ion-footer>
  </ng-template>
</ion-modal>
