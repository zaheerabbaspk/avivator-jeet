<div class="home-header" [class.logged-in-bg]="isLoggedIn">
  <!-- Conditional Left -->
  <div class="header-left">
    <div class="header-menu-icon" [class.is-open]="isMenuOpen" (click)="toggleMenu()">
      <div class="custom-menu-icon">
        <div class="lines">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="chevron">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </div>
      </div>
    </div>
    <span class="logo-aviator">bp999</span>
  </div>

  <!-- Conditional Right -->
  <div class="header-right">
    @if (isLoggedIn) {
      <div class="header-balance-wrap v2" [class.loading-wrap]="isLoadingBalance">
        <div class="flag-circle">
          <svg viewBox="0 0 100 100" class="pk-svg">
            <circle cx="50" cy="50" r="50" fill="#01411c" />
            <path d="M0 0 h25 v100 h-25 z" fill="#fff" />
            <circle cx="68" cy="50" r="28" fill="#fff" />
            <circle cx="76" cy="50" r="24" fill="#01411c" />
            <polygon points="78,40 81,48 89,48 83,54 85,62 78,57 71,62 73,54 67,48 75,48" fill="#fff" />
          </svg>
        </div>
        <span class="balance-value-gold">
          {{ isLoadingBalance ? 'Loading' : (userBalance | number:'1.2-2') }}
        </span>
        <ion-icon name="reload-outline" 
                  class="refresh-icon" 
                  [class.spinning]="isLoadingBalance"
                  (click)="onRefresh()"></ion-icon>
      </div>
      <div class="deposit-btn-wrap">
        <button class="header-deposit-btn-blue" (click)="onDeposit()">
          Deposit <ion-icon name="caret-down"></ion-icon>
        </button>
        <div class="bonus-badge">+7%</div>
      </div>
    } @else {
      <button class="login-btn" (click)="onLogin('login')">Login</button>
      <button class="register-btn" (click)="onLogin('register')">
        <span class="reg-badge">+1777</span>
        Register
      </button>
    }
  </div>
</div>
