<div class="absolute left-0 z-50 flex flex-col" [style.top.px]="topPx">
    @if (isOpen) {
    <div class="side-nav-panel expanded shadow-[2px_0_15px_rgba(0,0,0,0.8)] cursor-pointer">
        <button class="side-nav-btn" (click)="onLobby.emit()">
            <ion-icon name="home"></ion-icon>
            <span>Lobby</span>
        </button>
        <div class="side-nav-divider"></div>
        <button class="side-nav-btn" (click)="onDeposit.emit()">
            <ion-icon name="wallet"></ion-icon>
            <span>Deposit</span>
        </button>
        <div class="side-nav-spacer"></div>
        <div class="flex flex-col items-center py-1 bg-white/5 rounded-r-lg" (click)="onToggle.emit(false)">
            <div class="w-1.5 h-1.5 bg-white/40 rounded-full mb-1"></div>
            <div class="w-1.5 h-1.5 bg-white/40 rounded-full mb-1"></div>
            <div class="w-1.5 h-1.5 bg-white/40 rounded-full"></div>
        </div>
    </div>
    } @else {
    <div class="side-nav-panel collapsed shadow-[2px_0_10px_rgba(0,0,0,0.6)] cursor-pointer"
        (click)="onToggle.emit(true)">
        <ion-icon name="play"></ion-icon>
    </div>
    }
</div>
