<div class="brand-swiper">
  <div class="brand-track" [style.transform]="'translateX(-' + (currentBrandSlide * 33.333) + '%)'">
    @for (brand of brands; track brand.name) {
      <div class="brand-slide">
        <div class="brand-card">
          <img [src]="brand.image" [alt]="brand.name" class="brand-img">
          <div class="brand-overlay">
            <div class="brand-tag">Brand<br>Alliance</div>
            <div class="brand-name" [style.color]="brand.color">{{ brand.name }}</div>
          </div>
        </div>
      </div>
    }
  </div>
</div>
