<div class="min-h-full flex flex-col relative w-full pt-0">
  
  <!-- Dashboard Header -->
  <div class="bg-[#1A1C22]/80 border-b border-white/[0.04] px-4 py-3 flex items-center justify-between">
    <div class="flex flex-col gap-1">
      <span class="text-[#6B7280] text-[11px] font-medium">Settlement cycle</span>
      <span class="text-white text-[12px] font-bold">Daily settlement</span>
    </div>
    <div class="flex flex-col items-end gap-1">
      <span class="text-[#6B7280] text-[11px] font-medium">Time until next settlement</span>
      <span class="text-white text-[12px] font-bold">0 day(s) 02:13:27</span>
    </div>
  </div>

  <!-- Filter Dropdown Trigger -->
  <div class="relative z-50 px-3 pt-4 inline-block">
    <button 
      (click)="toggleDropdown()" 
      [class.border-[#F1C15A]]="isDropdownOpen"
      [class.text-[#F1C15A]]="isDropdownOpen"
      [class.border-white_08]="!isDropdownOpen"
      [class.text-[#8E99A7]]="!isDropdownOpen"
      class="bg-transparent border border-white/[0.08] rounded-full px-4 py-1.5 flex items-center justify-between min-w-[90px] transition-colors relative z-[60]">
      <span class="text-[11px] font-medium tracking-wide">{{ activeFilter }}</span>
      <ion-icon [name]="isDropdownOpen ? 'chevron-up' : 'chevron-down'" class="text-[12px] ml-1"></ion-icon>
    </button>
  </div>

  <!-- Background overlay & Modal -->
  @if (isDropdownOpen) {
     <div class="fixed inset-0 z-40 bg-black/50 backdrop-blur-[2px]" (click)="toggleDropdown()" style="margin-top: 0;"></div>
     <div class="absolute top-[115px] left-1/2 -translate-x-1/2 w-[calc(100%-24px)] max-w-[360px] z-[60]">
        <app-custom-date-picker 
          [activeFilter]="activeFilter" 
          (confirm)="handleConfirm($event)" 
          (cancel)="handleCancel()">
        </app-custom-date-picker>
     </div>
  }

  <!-- Empty State -->
  <div class="flex-1 flex flex-col items-center justify-center -mt-16 relative z-30 pointer-events-none">
     <app-empty-record></app-empty-record>
  </div>
  
</div>
