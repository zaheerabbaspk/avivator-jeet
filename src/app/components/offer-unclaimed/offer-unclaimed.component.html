<div class="px-3.5" *ngIf="unclaimed">
  <div class="flex items-center gap-2 mb-8">
    <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-[#1A2128]/60 shadow-inner">
      <div
        class="w-[15px] h-[15px] rounded-full overflow-hidden border border-[#F1C15A] flex-shrink-0 shadow-sm bg-[#00401A] relative flex items-center justify-center">
        <svg viewBox="0 0 100 100" class="w-full h-full">
          <rect width="100" height="100" fill="#00401A" />
          <rect width="30" height="100" fill="white" />
          <path d="M78,50 a24,24 0 1,1 -34,-20 a20,20 0 1,0 34,20" fill="white" transform="translate(6, 0)" />
          <path d="M78,34 l2,5 l5,1 l-4,3 l1,6 l-4,-3 l-4,3 l1,-6 l-4,-3 l5,-1 z" fill="white" />
        </svg>
      </div>
      <!-- Total balance -->
      <span class="text-[#F1C15A] text-[15px] font-black underline underline-offset-[5px] decoration-2">{{ unclaimed.total }}</span>
      <!-- Cyan refresh icon -->
      <ion-icon name="refresh-outline" (click)="refreshUnclaimed.emit()" [class.animate-spin]="isLoadingUnclaimed"
        class="text-[#00F0FF] text-[17px] font-bold cursor-pointer ml-1"></ion-icon>
    </div>
  </div>

  <!-- Category Breakdown -->
  <div class="space-y-3">
    @for (cat of unclaimed.categories; track cat.label) {
      <div class="bg-[#252830]/50 p-4 rounded-xl border border-white/[0.05] flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-lg bg-[#111419] flex items-center justify-center">
            <ion-icon [name]="cat.icon" class="text-[#F1C15A] text-[18px]"></ion-icon>
          </div>
          <span class="text-[#ADB6C3] text-[13px] font-bold">{{ cat.label }}</span>
        </div>
        <div class="text-right">
          <span class="text-white text-[14px] font-black block">Rs {{ cat.value }}</span>
          <span class="text-[#F1C15A] text-[10px] font-bold cursor-pointer active:opacity-60" (click)="claimCategory.emit(cat)">Claim Now</span>
        </div>
      </div>
    }
  </div>
</div>
