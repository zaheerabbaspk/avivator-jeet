<div class="crash-header" style="padding-top: calc(env(safe-area-inset-top) + 10px);">
    @if (!isLoading) {
    <!-- LEFT: Branding -->
    <div class="flex items-center">
        <span class="font-black italic text-xl leading-none" style="color: #ef4444; font-family: 'Arial Black', Impact, sans-serif;
                     text-shadow: 1px 1px 0 #7f0000, 2px 2px 8px rgba(239,68,68,0.5);">
            bp999
        </span>
    </div>

    <!-- RIGHT: Balance + Sound + Hamburger -->
    <div class="flex items-center gap-2">
        <div class="balance-capsule">
            <span class="balance-value tabular-nums">
                {{ balance | number:'1.2-2' }}
            </span>
            <span class="currency-label">PKR</span>
        </div>

        <!-- Sound Toggle -->
        <div class="w-7 h-7 flex items-center justify-center rounded-md cursor-pointer sound-btn"
            [class.muted]="soundService.isMuted()"
            (click)="toggleMute()">
            <ion-icon [name]="soundService.isMuted() ? 'volume-mute-outline' : 'volume-medium-outline'"></ion-icon>
        </div>

        <!-- Menu Toggle -->
        <div class="w-7 h-7 flex items-center justify-center rounded-md cursor-pointer menu-btn"
            (click)="toggleMenu.emit()">
            <ion-icon name="menu-outline"></ion-icon>
        </div>
    </div>
    }
</div>
