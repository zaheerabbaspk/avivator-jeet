<svg width="400" height="600" viewBox="0 0 400 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Brighter Green Base -->
  <rect width="400" height="600" fill="#034B3D"/>
  
  <!-- DETAILED MANDALA PATTERN -->
  <g opacity="0.3" transform="translate(200, 300)">
    <circle r="180" stroke="#FEE08B" stroke-width="1.2" stroke-dasharray="3 10"/>
    <circle r="210" stroke="#FEE08B" stroke-width="0.6" opacity="0.7"/>
    
    <!-- Rotating Lotus Pattern (Higher Intensity) -->
    @for $i from 0 through 11 {
      <g transform="rotate(#{($i * 30)})">
        <path d="M0 -150 Q20 -185 0 -225 Q-20 -185 0 -150" fill="none" stroke="#FEE08B" stroke-width="1.2"/>
        <circle cy="-245" r="2.5" fill="#FEE08B" filter="url(#glow)"/>
      </g>
    }
  </g>

  <!-- Power Radial Glow Overlay -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="center_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#059669" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#034B3D" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="200" cy="300" r="350" fill="url(#center_glow)"/>
</svg>
